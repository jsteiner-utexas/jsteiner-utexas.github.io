<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Randomizer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ─── ADJUSTABLE PARAMETERS ─────────────────────────────────── */
  /* To change group size limits, edit MIN_GROUP_SIZE and MAX_GROUP_SIZE
     in the <script> section below. Current defaults: min=6, max=9.      */
  /* ─────────────────────────────────────────────────────────────── */

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #777;
    --radius: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  .header {
    padding: 40px 48px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 20px;
    flex-wrap: wrap;
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 6vw, 80px);
    letter-spacing: 2px;
    line-height: 1;
    color: var(--accent);
  }

  .header-sub {
    font-size: 14px;
    color: var(--muted);
    padding-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .main {
    display: grid;
    grid-template-columns: 380px 1fr;
    min-height: calc(100vh - 120px);
  }

  /* ── LEFT PANEL ── */
  .panel-left {
    border-right: 1px solid var(--border);
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .params-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .param-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: border-color 0.2s;
  }

  .param-box:focus-within {
    border-color: var(--accent);
  }

  .param-box label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .param-box input[type="number"] {
    background: none;
    border: none;
    outline: none;
    color: var(--accent);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    width: 100%;
  }

  /* ── NAME INPUT AREA ── */
  .textarea-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .textarea-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #name-count {
    font-size: 12px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  textarea {
    flex: 1;
    min-height: 280px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: #444; }

  .hint {
    font-size: 12px;
    color: #555;
    line-height: 1.5;
  }

  /* ── ACTION BUTTONS ── */
  .actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius);
    padding: 16px 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    width: 100%;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(232,255,71,0.3);
  }

  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    width: 100%;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-secondary:hover { border-color: var(--muted); color: var(--text); }

  /* ── RIGHT PANEL ── */
  .panel-right {
    padding: 32px 36px;
    overflow-y: auto;
  }

  /* ── PLACEHOLDER STATE ── */
  .empty-state {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--muted);
    text-align: center;
  }

  .empty-icon {
    font-size: 64px;
    opacity: 0.15;
    line-height: 1;
  }

  .empty-state p { font-size: 14px; max-width: 260px; line-height: 1.6; }

  /* ── RESULTS ── */
  .results-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .results-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 1px;
  }

  .results-meta {
    font-size: 13px;
    color: var(--muted);
  }

  .results-meta span {
    color: var(--accent);
    font-weight: 600;
  }

  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }

  .group-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: cardIn 0.4s ease both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .group-card:nth-child(1)  { animation-delay: 0.00s; }
  .group-card:nth-child(2)  { animation-delay: 0.04s; }
  .group-card:nth-child(3)  { animation-delay: 0.08s; }
  .group-card:nth-child(4)  { animation-delay: 0.12s; }
  .group-card:nth-child(5)  { animation-delay: 0.16s; }
  .group-card:nth-child(6)  { animation-delay: 0.20s; }
  .group-card:nth-child(7)  { animation-delay: 0.24s; }
  .group-card:nth-child(8)  { animation-delay: 0.28s; }
  .group-card:nth-child(9)  { animation-delay: 0.32s; }

  .group-header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .group-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
  }

  .group-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--surface2);
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .group-members {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .member {
    font-size: 14px;
    padding: 6px 10px;
    border-radius: 6px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
  }

  .member:hover { background: #2f2f2f; }

  .member-num {
    font-size: 10px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    min-width: 16px;
  }

  /* ── COLOR ACCENTS per group ── */
  .group-card:nth-child(9n+1) .group-header  { border-top: 3px solid #e8ff47; }
  .group-card:nth-child(9n+2) .group-header  { border-top: 3px solid #ff6b35; }
  .group-card:nth-child(9n+3) .group-header  { border-top: 3px solid #35d9ff; }
  .group-card:nth-child(9n+4) .group-header  { border-top: 3px solid #c084fc; }
  .group-card:nth-child(9n+5) .group-header  { border-top: 3px solid #fb7185; }
  .group-card:nth-child(9n+6) .group-header  { border-top: 3px solid #34d399; }
  .group-card:nth-child(9n+7) .group-header  { border-top: 3px solid #fbbf24; }
  .group-card:nth-child(9n+8) .group-header  { border-top: 3px solid #818cf8; }
  .group-card:nth-child(9n+0) .group-header  { border-top: 3px solid #f472b6; }

  /* ── ERROR MESSAGE ── */
  .error-banner {
    background: rgba(255, 107, 53, 0.1);
    border: 1px solid rgba(255, 107, 53, 0.3);
    border-radius: var(--radius);
    padding: 14px 18px;
    font-size: 13px;
    color: var(--accent2);
    line-height: 1.5;
    display: none;
    margin-top: 12px;
  }

  .error-banner.show { display: block; }

  /* ── COPY BUTTON ── */
  .btn-copy {
    background: transparent;
    color: var(--accent);
    border: 1px solid rgba(232,255,71,0.3);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }

  .btn-copy:hover { background: rgba(232,255,71,0.08); border-color: var(--accent); }

  /* ── SIGNUP MODE ── */
  .signup-section {
    margin-top: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  .text-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .text-input:focus { border-color: var(--accent); }

  .btn-add {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }

  .btn-add:hover { opacity: 0.85; }

  .name-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 7px;
    animation: pillIn 0.2s ease both;
  }

  @keyframes pillIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  .pill-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0;
    transition: color 0.15s;
  }

  .pill-remove:hover { color: var(--accent2); }

  .mode-tabs {
    display: flex;
    gap: 2px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
  }

  .tab {
    flex: 1;
    padding: 9px;
    border: none;
    border-radius: 7px;
    background: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .tab.active {
    background: var(--surface2);
    color: var(--text);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; }
    .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
    .header { padding: 24px 20px 20px; }
    .panel-left, .panel-right { padding: 24px 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Group Randomizer</h1>
  <span class="header-sub">Shuffle & split any list into balanced groups</span>
</div>

<div class="main">

  <!-- ── LEFT PANEL ── -->
  <div class="panel-left">

    <div>
      <div class="section-label">Group Size Parameters</div>
      <div class="params-grid">
        <div class="param-box">
          <label>Min Size</label>
          <input type="number" id="min-size" value="6" min="1" max="50">
        </div>
        <div class="param-box">
          <label>Max Size</label>
          <input type="number" id="max-size" value="9" min="1" max="50">
        </div>
      </div>
    </div>

    <div class="mode-tabs">
      <button class="tab active" onclick="switchMode('bulk')">📋 Paste List</button>
      <button class="tab" onclick="switchMode('signup')">✍️ Sign Up</button>
    </div>

    <!-- BULK MODE -->
    <div id="bulk-mode" class="textarea-wrap">
      <div class="textarea-header">
        <div class="section-label" style="margin:0">Names</div>
        <span id="name-count">0 names</span>
      </div>
      <textarea id="names-input" placeholder="Enter names here — one per line or separated by commas.

Example:
Alice Johnson
Bob Smith
Carol White
..." oninput="updateCount()"></textarea>
      <div class="hint">Accepts one name per line, or comma-separated names, or a mix of both.</div>
    </div>

    <!-- SIGNUP MODE -->
    <div id="signup-mode" style="display:none" class="textarea-wrap">
      <div class="section-label">Sign Up</div>
      <div class="signup-section">
        <div class="input-row">
          <input type="text" class="text-input" id="signup-input" placeholder="Enter your name…" onkeydown="if(event.key==='Enter')addSignup()">
          <button class="btn-add" onclick="addSignup()">Add</button>
        </div>
        <div id="name-pills" class="name-pills">
          <span style="font-size:13px;color:var(--muted)">No names added yet.</span>
        </div>
      </div>
      <div style="margin-top:4px;display:flex;justify-content:space-between;align-items:center">
        <span id="signup-count" style="font-size:12px;color:var(--muted)">0 names</span>
        <button class="btn-secondary" style="width:auto;padding:8px 14px;font-size:12px" onclick="clearSignups()">Clear all</button>
      </div>
    </div>

    <div class="error-banner" id="error-banner"></div>

    <div class="actions">
      <button class="btn-primary" onclick="randomize()">⚡ RANDOMIZE GROUPS</button>
      <button class="btn-secondary" onclick="clearAll()">Clear Everything</button>
    </div>

  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="panel-right" id="panel-right">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">🎲</div>
      <p>Add names on the left, then hit <strong>Randomize Groups</strong> to get started.</p>
    </div>
    <div id="results" style="display:none"></div>
  </div>

</div>

<script>
  /* ═══════════════════════════════════════════════════════════════
     ADJUSTABLE PARAMETERS
     Change MIN_GROUP_SIZE and MAX_GROUP_SIZE to set default limits.
     Users can also adjust them via the inputs in the UI.
  ════════════════════════════════════════════════════════════════ */
  const MIN_GROUP_SIZE = 6;
  const MAX_GROUP_SIZE = 9;

  // Initialize default values from constants
  document.getElementById('min-size').value = MIN_GROUP_SIZE;
  document.getElementById('max-size').value = MAX_GROUP_SIZE;

  // ── STATE ──
  let currentMode = 'bulk';
  let signupNames = [];

  // ── MODE SWITCH ──
  function switchMode(mode) {
    currentMode = mode;
    document.getElementById('bulk-mode').style.display   = mode === 'bulk'   ? 'flex' : 'none';
    document.getElementById('signup-mode').style.display = mode === 'signup' ? 'flex' : 'none';
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && mode === 'bulk') || (i === 1 && mode === 'signup'));
    });
    clearError();
  }

  // ── NAME COUNT ──
  function updateCount() {
    const names = parseNames();
    const el = document.getElementById('name-count');
    el.textContent = `${names.length} name${names.length !== 1 ? 's' : ''}`;
  }

  // ── PARSE NAMES from textarea ──
  function parseNames() {
    const raw = document.getElementById('names-input').value;
    return raw
      .split(/[\n,]+/)
      .map(n => n.trim())
      .filter(n => n.length > 0);
  }

  // ── SIGNUP MODE ──
  function addSignup() {
    const input = document.getElementById('signup-input');
    const name = input.value.trim();
    if (!name) return;
    if (signupNames.includes(name)) {
      showError(`"${name}" is already on the list.`);
      return;
    }
    signupNames.push(name);
    input.value = '';
    renderPills();
    clearError();
  }

  function removeSignup(idx) {
    signupNames.splice(idx, 1);
    renderPills();
  }

  function clearSignups() {
    signupNames = [];
    renderPills();
  }

  function renderPills() {
    const container = document.getElementById('name-pills');
    document.getElementById('signup-count').textContent = `${signupNames.length} name${signupNames.length !== 1 ? 's' : ''}`;
    if (signupNames.length === 0) {
      container.innerHTML = '<span style="font-size:13px;color:var(--muted)">No names added yet.</span>';
      return;
    }
    container.innerHTML = signupNames.map((n, i) =>
      `<div class="pill">
        ${escapeHtml(n)}
        <button class="pill-remove" onclick="removeSignup(${i})" title="Remove">×</button>
      </div>`
    ).join('');
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── ERROR ──
  function showError(msg) {
    const el = document.getElementById('error-banner');
    el.textContent = msg;
    el.classList.add('show');
  }

  function clearError() {
    document.getElementById('error-banner').classList.remove('show');
  }

  // ── SHUFFLE (Fisher-Yates) ──
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ── CALCULATE OPTIMAL GROUPS ──
  function calcGroups(names, minSize, maxSize) {
    const n = names.length;
    if (n < minSize) return null; // not enough names

    // Try each possible number of groups — pick the most even split
    let best = null;
    let bestScore = Infinity;

    for (let g = 1; g <= n; g++) {
      const base = Math.floor(n / g);
      const rem  = n % g;
      if (base < minSize) break;          // groups are too small
      if (base > maxSize && rem === 0) continue; // groups are too large
      if (base + 1 > maxSize && rem > 0) continue; // overflow groups too large

      // Score = variance in group sizes (lower = more even)
      const sizes = Array(g).fill(base);
      for (let i = 0; i < rem; i++) sizes[i]++;
      const avg = sizes.reduce((a, b) => a + b, 0) / sizes.length;
      const variance = sizes.reduce((a, b) => a + (b - avg) ** 2, 0) / sizes.length;

      if (variance < bestScore) {
        bestScore = variance;
        best = { numGroups: g, sizes };
      }
    }

    return best;
  }

  // ── RANDOMIZE ──
  function randomize() {
    clearError();

    const minSize = parseInt(document.getElementById('min-size').value) || MIN_GROUP_SIZE;
    const maxSize = parseInt(document.getElementById('max-size').value) || MAX_GROUP_SIZE;

    if (minSize < 1 || maxSize < 1) { showError('Group size values must be at least 1.'); return; }
    if (minSize > maxSize) { showError('Min size cannot be greater than max size.'); return; }

    const names = currentMode === 'bulk' ? parseNames() : [...signupNames];

    if (names.length === 0) {
      showError('Please add at least one name before randomizing.');
      return;
    }

    if (names.length < minSize) {
      showError(`You need at least ${minSize} names to form a group. You only have ${names.length}.`);
      return;
    }

    const plan = calcGroups(names, minSize, maxSize);

    if (!plan) {
      showError(`Cannot form groups of ${minSize}–${maxSize} with ${names.length} names. Try adjusting the min/max size parameters.`);
      return;
    }

    const shuffled = shuffle(names);
    const groups = [];
    let cursor = 0;
    for (let s of plan.sizes) {
      groups.push(shuffled.slice(cursor, cursor + s));
      cursor += s;
    }

    renderResults(groups, names.length, minSize, maxSize);
  }

  // ── RENDER RESULTS ──
  function renderResults(groups, total, minSize, maxSize) {
    document.getElementById('empty-state').style.display = 'none';
    const results = document.getElementById('results');
    results.style.display = 'block';

    const groupCards = groups.map((members, i) => `
      <div class="group-card">
        <div class="group-header">
          <span class="group-name">Group ${i + 1}</span>
          <span class="group-badge">${members.length} members</span>
        </div>
        <div class="group-members">
          ${members.map((m, j) => `
            <div class="member">
              <span class="member-num">${j + 1}.</span>
              ${escapeHtml(m)}
            </div>`).join('')}
        </div>
      </div>`).join('');

    results.innerHTML = `
      <div class="results-header">
        <div class="results-title">Results</div>
        <div style="display:flex;gap:10px;align-items:center">
          <div class="results-meta">
            <span>${total}</span> people → <span>${groups.length}</span> groups
          </div>
          <button class="btn-copy" onclick="copyResults()">Copy</button>
          <button class="btn-copy" onclick="randomize()" style="border-color:rgba(255,107,53,0.4);color:var(--accent2)">Re-shuffle</button>
        </div>
      </div>
      <div class="groups-grid">${groupCards}</div>`;
  }

  // ── COPY TO CLIPBOARD ──
  function copyResults() {
    const cards = document.querySelectorAll('.group-card');
    let text = '';
    cards.forEach((card, i) => {
      text += `Group ${i + 1}:\n`;
      card.querySelectorAll('.member').forEach(m => {
        text += `  ${m.textContent.trim().replace(/^\d+\.\s*/, '')}\n`;
      });
      text += '\n';
    });
    navigator.clipboard.writeText(text.trim()).then(() => {
      const btn = document.querySelector('.btn-copy');
      if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 2000); }
    });
  }

  // ── CLEAR ALL ──
  function clearAll() {
    document.getElementById('names-input').value = '';
    signupNames = [];
    renderPills();
    updateCount();
    clearError();
    document.getElementById('empty-state').style.display = 'flex';
    document.getElementById('results').style.display = 'none';
  }
</script>
</body>
</html>
